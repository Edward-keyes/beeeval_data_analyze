server {
    listen 80;
    server_name _;

    client_max_body_size 500M;

    # Docker 内置 DNS（127.0.0.11）。配合下面用变量写的 proxy_pass，
    # 可以让 nginx 在每次请求时重新解析 api 服务名，
    # 避免 api 容器重建后拿到新 IP、nginx 还在连旧 IP 导致 502。
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # 将上游目标放到变量里：nginx 对带变量的 proxy_pass 会在每次请求时
    # 重新做 DNS 解析（走上面的 resolver），而不是启动时定死一次。
    set $upstream_api http://api:8004;

    # Frontend SPA（@spa 避免 dist 里没有 index.html 时 try_files 内部重定向死循环）
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ @spa;
    }
    location @spa {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # ───── 视频流：单独 location，关 buffering、走 HTTP/1.1 keep-alive ─────
    # 经验教训：之前在这里开过 proxy_buffering on 想提高吞吐，结果首字节多等
    # 几百毫秒（nginx 要等 busy_buffers 满才推给浏览器）。视频播放器要的是
    # 「字节边到边解码」，buffering off 才对路。
    #
    # ^~ 前缀匹配的优先级高于普通的 /api/，所以会先命中这个块。
    location ^~ /api/nas/stream {
        proxy_pass $upstream_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Range 请求头要原样转给后端，否则浏览器拖进度条没法用
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        # HTTP/1.1 + Connection: "" 让 nginx 复用到上游 api 的 TCP 连接，
        # 拖进度条产生的多次 Range 请求不重复握手
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # 视频流：边接边发，不缓冲，首字节最快
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ^~ /api/video/stream {
        proxy_pass $upstream_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    # API reverse proxy（其它接口走这里，保持 buffering off，方便 SSE / 任务进度长连接）
    location /api/ {
        # 注意：用变量写 proxy_pass 时，原请求 URI 不会自动转发，
        # 必须用 $request_uri 手动拼完整路径。
        proxy_pass $upstream_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # Dr. Bee standalone page
    location /dr-bee {
        proxy_pass $upstream_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Screenshots static files
    location /screenshots/ {
        proxy_pass $upstream_api$request_uri;
    }
}
